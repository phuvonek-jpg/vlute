<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161922;
      --border:   #252a35;
      --accent:   #7c6ff7;
      --accent2:  #a78bfa;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --user-bg:  #1e2235;
      --ai-bg:    #131720;
      --success:  #34d399;
      --radius:   14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; }
    .header-info span { font-size: 12px; color: var(--muted); }
    .status-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 8px var(--success);
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 800px;
      width: 100%;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .msg.ai   .avatar { background: var(--surface); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      position: relative;
    }

    /* copy button on AI bubble */
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s, color .15s;
      font-family: 'Inter', sans-serif;
    }
    .msg.ai .bubble:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); }
    .copy-btn.copied { color: var(--success); }

    /* ── Empty state ── */
    #empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }
    #empty .icon { font-size: 48px; margin-bottom: 12px; }
    #empty h2 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    #empty p  { font-size: 13px; line-height: 1.6; }
    #empty kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent2);
    }

    /* ── Typing indicator ── */
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    #input-bar {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 160px;
      min-height: 22px;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:hover { opacity: .9; transform: scale(1.05); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    #send-btn svg { fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }
    .hint kbd {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <div class="header-info">
    <h1>AI Chat</h1>
    <span>Trợ lý cá nhân</span>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div id="empty">
    <div class="icon">💬</div>
    <h2>Bắt đầu cuộc trò chuyện</h2>
    <p>Gõ câu hỏi hoặc dán nội dung bằng <kbd>Ctrl+V</kbd><br />
    rồi nhấn <kbd>Enter</kbd> để gửi.</p>
  </div>
</div>

<div id="input-bar">
  <div class="input-wrap">
    <textarea id="msg-input" rows="1" placeholder="Nhập câu hỏi hoặc dán nội dung (Ctrl+V)…"></textarea>
    <button id="send-btn" title="Gửi (Enter)">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-1.5-9-1.5V1.5z"/></svg>
    </button>
  </div>
  <p class="hint"><kbd>Enter</kbd> gửi · <kbd>Shift+Enter</kbd> xuống dòng · <kbd>Ctrl+V</kbd> dán · click đáp án để <kbd>Ctrl+C</kbd> copy</p>
</div>

<div id="toast">✓ Đã copy!</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const empty   = document.getElementById('empty');
  const toast   = document.getElementById('toast');

  let loading = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // Global Ctrl+V — focus input, paste will land there
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
      input.focus();
    }
  });

  function showToast(msg = '✓ Đã copy!') {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function appendMsg(role, text, skipEmpty = true) {
    if (skipEmpty && empty.parentNode) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai') {
      // Copy button
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(bubble.dataset.text || '').then(() => {
          copyBtn.textContent = '✓';
          copyBtn.classList.add('copied');
          showToast();
          setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
        });
      });
      bubble.appendChild(copyBtn);
    }

    const content = document.createElement('span');
    content.className = 'content';
    content.textContent = text;
    bubble.appendChild(content);
    bubble.dataset.text = text;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return { div, bubble, content };
  }

  function appendTyping() {
    if (empty.parentNode) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || loading) return;

    appendMsg('user', text);
    input.value = '';
    input.style.height = 'auto';

    loading = true;
    sendBtn.disabled = true;

    const typingEl = appendTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typingEl.remove();

      const answer = data.answer || data.error || 'Không nhận được phản hồi.';
      appendMsg('ai', answer);
    } catch (err) {
      typingEl.remove();
      appendMsg('ai', '⚠️ Lỗi kết nối. Kiểm tra server đang chạy chưa?');
    }

    loading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
